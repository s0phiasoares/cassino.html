<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cassino da Mula</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎰 Cassino da Mula</h1>

<p>👤 <span id="nome"></span></p>
<p>💰 R$ <span id="saldo"></span></p>

<input type="number" id="aposta" placeholder="Aposta">
<button id="btnGirar">Girar</button>

<div class="slot" id="r1">❔</div>
<div class="slot" id="r2">❔</div>
<div class="slot" id="r3">❔</div>

<p id="mensagem"></p>

<audio id="somGiro" src="https://www.soundjay.com/misc/sounds/slot-machine-1.mp3"></audio>
<audio id="somWin" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
